<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Prediction Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif
        }

        body {
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .25);
            animation: fade .5s ease;
        }

        h1,
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 15px
        }

        .hidden {
            display: none
        }

        .question {
            background: #f8fafc;
            border-left: 5px solid #2563eb;
            padding: 15px;
            border-radius: 12px;
            margin: 12px 0;
        }

        .question p {
            font-weight: 600;
            margin-bottom: 10px
        }

        label {
            display: block;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer
        }

        label:hover {
            background: #eef4ff
        }

        input[type=number] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dbeafe;
            border-radius: 10px;
            margin: 8px 0 15px;
        }

        input[type=number]:focus {
            outline: none;
            border-color: #2563eb
        }

        button {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #fff;
            border: none;
            padding: 14px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px)
        }

        .result {
            padding: 25px;
            border-radius: 15px;
            background: #f0fdf4;
            border: 2px solid #22c55e;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .center {
            text-align: center
        }

        .icon {
            font-size: 70px;
            text-align: center;
            margin-bottom: 10px
        }

        @keyframes fade {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }
    </style>
</head>

<body>

    <div class="container" id="welcome">
        <div class="icon">🎓</div>
        <h1>Student Placement Prediction Portal</h1>
        <p class="center">Complete the IQ Assessment Test first.</p>
        <div class="center" style="margin-top:20px">
            <button onclick="startTest()">Start IQ Test</button>
        </div>
    </div>

    <div class="container hidden" id="testPage">
        <h2>IQ Assessment Test</h2>
        <div id="questions"></div>
        <div class="center" style="margin-top:20px">
            <button onclick="calculateIQ()">Submit IQ Test</button>
        </div>
    </div>

    <div class="container hidden" id="detailsPage">
        <h2>Student Details</h2>

        <input type="hidden" id="iq">

        <label>CGPA</label>
        <input type="number" step="0.01" id="cgpa">

        <label>Previous Semester Result</label>
        <input type="number" step="0.01" id="prev">

        <label>Communication Skills (1-10)</label>
        <input type="number" id="comm">

        <label>Projects Completed</label>
        <input type="number" id="projects">

        <div class="center">
            <button onclick="predictPlacement()">Predict Placement</button>
        </div>
    </div>

    <div class="container hidden" id="resultPage">
        <h2>Prediction Result</h2>
        <div id="finalResult" class="result"></div>
    </div>

    <script>
        const questions = [["2,4,8,16, ?", ["32", "24", "30", "28"], 0],
        ["1,4,9,16, ?", ["20", "25", "30", "36"], 1],
        ["Odd One Out?", ["Apple", "Mango", "Car", "Banana"], 2],
        ["If A=1,B=2,C=3 then CAT=?", ["24", "22", "20", "18"], 0],
        ["5 workers complete work in 10 days. 1 worker?", ["20", "40", "50", "60"], 2],

        ["CPU Full Form?", ["Central Processing Unit", "Central Program Unit", "Computer Process Unit", "Control Processing Unit"], 0],
        ["Which is an Operating System?", ["Chrome", "Linux", "Google", "Python"], 1],
        ["Binary of Decimal 10?", ["1010", "1001", "1111", "1100"], 0],
        ["Which memory is temporary?", ["HDD", "SSD", "RAM", "ROM"], 2],
        ["Which device is output device?", ["Keyboard", "Mouse", "Monitor", "Scanner"], 2],

        ["What is Data Science?", ["Data Analysis & Prediction", "Web Design", "Networking", "Gaming"], 0],
        ["Which library is used for Data Analysis?", ["Pandas", "Flask", "React", "Bootstrap"], 0],
        ["Which library is used for numerical operations?", ["NumPy", "Django", "PHP", "NodeJS"], 0],
        ["Supervised Learning uses?", ["Labeled Data", "Unlabeled Data", "Images Only", "Text Only"], 0],
        ["Classification predicts?", ["Category", "Continuous Value", "Table", "Database"], 0],
        ["Regression predicts?", ["Continuous Value", "Class", "Category", "Group"], 0],
        ["Which algorithm is used for Classification?", ["Random Forest", "Apriori", "PCA", "K-Means"], 0],
        ["Train-Test Split is used for?", ["Model Evaluation", "Styling", "Database", "Hosting"], 0],
        ["Overfitting means?", ["Model memorizes data", "Model learns nothing", "Fast Training", "Low Accuracy"], 0],
        ["Accuracy means?", ["Correct Predictions Percentage", "Speed", "Memory", "Dataset Size"], 0],

        ["HTML stands for?", ["Hyper Text Markup Language", "High Text Markup Language", "Home Text Markup Language", "Hyper Tool Markup Language"], 0],
        ["CSS is used for?", ["Styling", "Database", "Backend", "Hosting"], 0],
        ["JavaScript is used for?", ["Interactivity", "Storage", "Networking", "Database"], 0],
        ["Which tag creates hyperlink?", ["<a>", "<h1>", "<div>", "<p>"], 0],
        ["Which CSS property changes text color?", ["color", "font", "background", "margin"], 0],

        ["SQL stands for?", ["Structured Query Language", "Standard Query Language", "Simple Query Language", "Stored Query Language"], 0],
        ["API stands for?", ["Application Programming Interface", "Application Process Interface", "Advanced Program Interface", "Application Project Interface"], 0],
        ["Git is used for?", ["Version Control", "Database", "Hosting", "Networking"], 0],
        ["FastAPI is written in?", ["Python", "Java", "PHP", "C++"], 0],
        ["Which company maintains Python?", ["Python Software Foundation", "Google", "Microsoft", "Oracle"], 0]
        ];

        const qDiv = document.getElementById("questions");

        questions.forEach((q, i) => {
            let html = `<div class='question'><p>${i + 1}. ${q[0]}</p>`;

            q[1].forEach((op, j) => {
                html += `
        <label>
            <input type="radio" name="q${i}" value="${j}">
            ${op}
        </label>`;
            });

            html += "</div>";
            qDiv.innerHTML += html;
        });

        function startTest() {
            document.getElementById("welcome").classList.add("hidden");
            document.getElementById("testPage").classList.remove("hidden");
        }

        function calculateIQ() {

            // All questions compulsory
            for (let i = 0; i < questions.length; i++) {
                let ans = document.querySelector(`input[name='q${i}']:checked`);

                if (!ans) {
                    alert("Please answer all questions before submitting!");
                    return;
                }
            }

            let score = 0;

            questions.forEach((q, i) => {
                let ans = document.querySelector(`input[name='q${i}']:checked`);

                if (parseInt(ans.value) === q[2]) {
                    score++;
                }
            });

            // IQ Calculation
            let iq = score * 5;

            document.getElementById("iq").value = iq;

            alert("Your IQ Score: " + iq);

            document.getElementById("testPage").classList.add("hidden");
            document.getElementById("detailsPage").classList.remove("hidden");
        }

        function predictPlacement() {

            let iq = document.getElementById("iq").value;
            let cgpa = document.getElementById("cgpa").value;
            let prev = document.getElementById("prev").value;
            let comm = document.getElementById("comm").value;
            let projects = document.getElementById("projects").value;

            document.getElementById("detailsPage").classList.add("hidden");
            document.getElementById("resultPage").classList.remove("hidden");

            document.getElementById("finalResult").innerHTML = `
    📊 IQ Score: ${iq}<br><br>
    🎯 CGPA: ${cgpa}<br><br>
    💬 Communication: ${comm}<br><br>
    💻 Projects: ${projects}<br><br>
    ⏳ Predicting...
    `;

            fetch("https://student-placement-prediction-61jo.onrender.com/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    IQ: Number(iq),
                    CGPA: Number(cgpa),
                    Prev_Sem_Result: Number(prev),
                    Communication_Skills: Number(comm),
                    Projects_Completed: Number(projects)
                })
            })
                .then(res => res.json())
                .then(data => {

                    if (data.prediction === "Yes") {

                        document.getElementById("finalResult").innerHTML = `
            🎉 <b>High Placement Probability</b><br><br>
            You have strong chances of getting placed.
            `;

                    } else {

                        document.getElementById("finalResult").innerHTML = `
            ⚠ <b>Low Placement Probability</b><br><br>
            Focus on improving your CGPA, communication skills and projects.
            `;

                    }

                })
                .catch(error => {

                    document.getElementById("finalResult").innerHTML = `
        ❌ Backend not connected.<br><br>
        Please check API deployment.
        `;

                    console.error(error);
                });
        }
    </script>
</body>

</html>
